name: Secret Scan

# Fail-closed secret-leak backstop for the PUBLIC ra-mandrel repo. Independent of
# the build+test gate (ci.yml) so it runs fast and red-flags a leak even if the
# build is broken. Mirrors `STAGE S` in scripts/ci.sh: history-aware gitleaks
# detect using the repo's .gitleaks.toml (default rules + documented allowlist).
# ANY finding => this job fails => the push/PR is blocked.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (history-aware)
    runs-on: ubuntu-latest
    steps:
      # Full history so the detect scan is history-aware (fetch-depth: 0).
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pin gitleaks to the same major/minor the team runs locally (8.18.x) so
      # the [allowlist] (singular table) config and rule behavior match exactly.
      - name: Install gitleaks 8.18.4
        run: |
          set -euo pipefail
          VERSION=8.18.4
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # History-aware scan (working tree + all commits) with the repo config.
      # --redact keeps any match out of the public Actions log. Non-zero exit on
      # any finding fails the job (fail closed).
      - name: gitleaks detect (config + history)
        run: |
          gitleaks detect \
            --redact \
            --no-banner \
            --config .gitleaks.toml \
            --log-opts="--all"
