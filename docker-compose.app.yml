# docker-compose.app.yml — overrides for the PUBLIC "app" instance (app.mandrel.ridgetopai.net)
#
# This is the first hosted instance. It is ISOLATED from Brian's personal prod Mandrel
# (/opt/mandrel, bare systemd): own container names, own volumes (namespaced by the
# `mandrel-app` project), localhost-only host ports.
#
# Full product unit = MCP server + Command UI. Bring up:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml \
#     --env-file /root/.mandrel-app.env -p mandrel-app up -d --build \
#     postgres redis mcp-server mandrel-command-backend mandrel-command-frontend
#
# nginx (app.mandrel.ridgetopai.net): / -> frontend:13000 (serves UI + proxies /api -> backend),
# /mcp -> mcp-server:18080. Secrets (MCP_AUTH_TOKEN, JWT_SECRET) live ONLY in
# /root/.mandrel-app.env (mode 600) — never committed.

services:
  postgres:
    container_name: mandrel-app-postgres
    ports: !override
      - "127.0.0.1:15432:5432"

  redis:
    container_name: mandrel-app-redis
    ports: !override
      - "127.0.0.1:16379:6379"

  mcp-server:
    container_name: mandrel-app-mcp-server
    ports: !override
      - "127.0.0.1:18080:8080"
    environment:
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN:?set MCP_AUTH_TOKEN in /root/.mandrel-app.env}"
      MCP_ALLOWED_HOSTS: "${MCP_ALLOWED_HOSTS:-app.mandrel.ridgetopai.net}"
    # --- Traefik fleet routing (cutover 2026-06-13, task 705fbad0: plain HTTP behind
    # nginx wildcard) ---------------------------------------------------------------
    # PathPrefix /mcp and /healthz on app.mandrel.ridgetopai.net -> this mcp-server:8080.
    # Higher priority than the catch-all frontend router so path matches win. NO tls here:
    # nginx terminates the wildcard cert and reverse-proxies plain HTTP to Traefik's `web`
    # entrypoint (127.0.0.1:8090). Remove this whole labels block to fully revert.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mandrel-app_mandrel-network"
      # /mcp -> mcp-server
      - "traefik.http.routers.app-mcp.rule=Host(`app.mandrel.ridgetopai.net`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.app-mcp.entrypoints=web"
      - "traefik.http.routers.app-mcp.priority=100"
      - "traefik.http.routers.app-mcp.service=app-mcp-svc"
      # /healthz -> mcp-server
      - "traefik.http.routers.app-healthz.rule=Host(`app.mandrel.ridgetopai.net`) && PathPrefix(`/healthz`)"
      - "traefik.http.routers.app-healthz.entrypoints=web"
      - "traefik.http.routers.app-healthz.priority=100"
      - "traefik.http.routers.app-healthz.service=app-mcp-svc"
      # shared service -> container port 8080
      - "traefik.http.services.app-mcp-svc.loadbalancer.server.port=8080"

  mandrel-command-backend:
    container_name: mandrel-app-command-backend
    ports: !override
      - "127.0.0.1:15000:5000"
    environment:
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in /root/.mandrel-app.env}"
      MANDREL_JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGIN: "https://app.mandrel.ridgetopai.net"
      FRONTEND_URL: "https://app.mandrel.ridgetopai.net"
      # MCP server is a sibling container here, reachable by service name (NOT
      # localhost, which is the backend itself). Used by the /api/v2/sessions/* proxies.
      MANDREL_MCP_URL: "http://mcp-server:8080"

  mandrel-command-frontend:
    container_name: mandrel-app-command-frontend
    ports: !override
      - "127.0.0.1:13000:3000"
    # --- Traefik fleet routing (cutover 2026-06-13, task 705fbad0: plain HTTP behind
    # nginx wildcard) ---------------------------------------------------------------
    # Catch-all for app.mandrel.ridgetopai.net -> the Command UI frontend:3000.
    # priority=1 (lowest) so /mcp + /healthz path routers above always win. No tls here
    # (nginx terminates). Remove this whole labels block to fully revert.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mandrel-app_mandrel-network"
      - "traefik.http.routers.app-frontend.rule=Host(`app.mandrel.ridgetopai.net`)"
      - "traefik.http.routers.app-frontend.entrypoints=web"
      - "traefik.http.routers.app-frontend.priority=1"
      - "traefik.http.routers.app-frontend.service=app-frontend-svc"
      - "traefik.http.services.app-frontend-svc.loadbalancer.server.port=3000"
