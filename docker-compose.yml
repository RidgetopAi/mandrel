# Mandrel Docker Compose Configuration
# Quick start: docker-compose up -d postgres redis
# Full stack: docker-compose up -d

version: '3.8'

# Health check configuration template
x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

services:
  # PostgreSQL with pgvector extension (required for Mandrel)
  postgres:
    image: ankane/pgvector:latest
    container_name: mandrel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mandrel}
      POSTGRES_USER: ${POSTGRES_USER:-mandrel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mandrel_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-provision required extensions on first init of a fresh data volume.
      - ./mcp-server/database/init/00-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    networks:
      - mandrel-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mandrel}"]

  # Redis for BullMQ queue system
  redis:
    image: redis:7-alpine
    container_name: mandrel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - mandrel-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]

  # MCP Server - Core Mandrel context management service
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mandrel-mcp-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-mandrel}
      DATABASE_USER: ${POSTGRES_USER:-mandrel}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-mandrel_dev_password}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Required by dotenv-safe validation (.env.example): REDIS_URL + log levels.
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_LOG_LEVEL: ${DB_LOG_LEVEL:-info}
      MCP_HTTP_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mandrel-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
    volumes:
      - mcp_data:/app/data
      - mcp_logs:/app/logs

  # Mandrel Command Backend - REST API server
  mandrel-command-backend:
    build:
      context: ./mandrel-command/backend
      dockerfile: Dockerfile
    container_name: mandrel-command-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      LOG_DIR: /app/logs
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-mandrel}
      DATABASE_USER: ${POSTGRES_USER:-mandrel}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-mandrel_dev_password}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      MCP_SERVER_URL: http://mcp-server:8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # All keys below are required to exist by the backend's dotenv-safe validation
      # (.env.example); missing keys cause process.exit(1) in production.
      MANDREL_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 24h
      BCRYPT_ROUNDS: "12"
      MANDREL_HTTP_PORT: 5000
      MANDREL_MCP_PORT: 8080
      CORS_ORIGIN: http://localhost:13000,http://localhost:3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_LOG_LEVEL: ${DB_LOG_LEVEL:-info}
      ENABLE_LOG_ROTATION: "true"
      LOG_MAX_FILE_SIZE: 20m
      LOG_MAX_FILES: 14d
      FEATURE_FLAG_PHASE1_FEATURE_FLAGS: "false"
      FEATURE_FLAG_PHASE1_CONTRACT_TESTS: "false"
      FEATURE_FLAG_PHASE1_REACT_ERROR_BOUNDARIES: "false"
      FRONTEND_URL: http://localhost:13000
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    networks:
      - mandrel-network
    healthcheck:
      <<: *healthcheck-defaults
      # Backend mounts routes under /api, so health lives at /api/health (not /health).
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
    volumes:
      - command_logs:/app/logs
      - command_uploads:/app/uploads

  # Mandrel Command Frontend - React UI served via nginx
  mandrel-command-frontend:
    build:
      context: ./mandrel-command/frontend
      dockerfile: Dockerfile
    container_name: mandrel-command-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: /api
    depends_on:
      mandrel-command-backend:
        condition: service_healthy
    networks:
      - mandrel-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mcp_data:
    driver: local
  mcp_logs:
    driver: local
  command_logs:
    driver: local
  command_uploads:
    driver: local

networks:
  mandrel-network:
    driver: bridge