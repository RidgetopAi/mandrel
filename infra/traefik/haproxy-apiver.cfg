# haproxy-apiver.cfg — Docker API VERSION-PREFIX REWRITER for Traefik.
# Owned ridgetop:ridgetop. Mounted read-only into the ra-traefik-apiver container.
#
# WHY: this host's docker daemon sets MinAPIVersion=1.40. Traefik v3's embedded moby
# client SEEDS API-version negotiation with a /v1.24/... request, which the daemon
# rejects (HTTP 400, "client version 1.24 is too old"), so negotiation never completes
# and the docker provider never loads. This proxy rewrites ANY /v1.XX path prefix to
# /v1.44 (within the daemon's 1.40–1.54 range) before forwarding to the read-only
# docker-socket-proxy, so the seed ping succeeds and negotiation settles.
#
# Chain:  Traefik --tcp--> ra-traefik-apiver (this, rewrites /v1.XX -> /v1.44)
#                  --tcp--> ra-traefik-dsp (tecnativa, least-privilege RO API)
#                  --unix--> /var/run/docker.sock
#
# Measured: /v1.24/version through this chain = 200 (vs 400 direct).

global
  log stdout format raw local0

defaults
  mode http
  log global
  option httplog
  timeout connect 5s
  timeout client 60s
  timeout server 60s

frontend docker_api
  bind :2375
  # Rewrite the leading /v1.<n> version segment to /v1.44 (daemon-acceptable).
  http-request set-path /v1.44%[path,regsub(^/v1\.[0-9]+,)]  if { path_reg ^/v1\.[0-9]+ }
  default_backend dsp

backend dsp
  # Forward to the read-only docker-socket-proxy (which holds the real socket).
  server dsp ra-traefik-dsp:2375
